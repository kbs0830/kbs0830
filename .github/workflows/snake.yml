name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00（台灣時間 14:00）自動跑
  workflow_dispatch:        # 也可以手動觸發

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=2d5a8e&color_dots[0]=f0ede8&color_dots[1]=c8d8ee&color_dots[2]=7aafd4&color_dots[3]=2d5a8e&color_dots[4]=1a3d5c
            dist/snake-dark.svg?palette=github-dark&color_snake=7aafd4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
