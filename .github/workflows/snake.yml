name: Generate Snake Animation

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00（台灣時間 14:00）自動跑
  workflow_dispatch:        # 也可以手動觸發

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=00d4ff&color_dots[0]=0d1117&color_dots[1]=0d2137&color_dots[2]=0d3a5c&color_dots[3]=0060a0&color_dots[4]=00d4ff
            dist/snake-dark.svg?color_snake=00d4ff&color_dots[0]=0d1117&color_dots[1]=0d2137&color_dots[2]=0d3a5c&color_dots[3]=0060a0&color_dots[4]=00d4ff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
